[build]
  command = "npm run build"
  publish = "dist"

# previously existing pages
[[redirects]]
  from = "/why-us"
  to = "/why-marth-systems"
  status = 301

[[redirects]]
  from = "/case-studies"
  to = "/blog"
  status = 301

[[redirects]]
  from = "/blog/automation-modern-bpo"
  to = "/blog/ai-workflows-healthcare-operations"
  status = 301

[[redirects]]
  from = "/blog/ai-back-office-operations"
  to = "/blog/ai-workflows-healthcare-operations"
  status = 301

[[redirects]]
  from = "/blog/modern-bpo-operations"
  to = "/blog/healthcare-bpo-small-growing-practices"
  status = 301

[[redirects]]
  from = "/blog/customer-experience-outsourcing"
  to = "/blog"
  status = 301

[[redirects]]
  from = "/blog/scaling-customer-support-teams"
  to = "/blog"
  status = 301

[[redirects]]
  from = "/blog/operational-efficiency-strategies"
  to = "/blog"
  status = 301

# SPA fallback — must come after all specific page redirects
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "https://marth.systems/*"
  to = "https://www.marth.systems/:splat"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"
